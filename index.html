<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Menú Alo Rico - Lomitos</title>

<style>
body {
  font-family: Arial, sans-serif;
  background:#fefaf0;
  margin:0;
  text-align:center;
}

header img.logo {
  width:120px;
  margin-top:20px;
}

header h1 {
  color:#c24a00;
}

header img.icono {
  width:60px;
}

.menu-container {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  padding:20px;
  padding-bottom:120px;
}

.product {
  width:180px;
  background:white;
  margin:15px;
  border-radius:10px;
  box-shadow:0 4px 8px rgba(0,0,0,0.1);
  cursor:pointer;
}

.product img {
  width:100%;
  height:140px;
  object-fit:cover;
}

/* BOTONES */
button{
 transition: all 0.15s ease;
 box-shadow: 0 4px 0 rgba(0,0,0,0.2);
}

button:active{
 transform: translateY(3px);
 box-shadow: 0 1px 0 rgba(0,0,0,0.2);
}

.btn-grid {
  position:fixed;
  right:15px;
  bottom:15px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  z-index:10000;
}

.btn-flotante {
  padding:12px;
  border:none;
  border-radius:50px;
  font-weight:bold;
  cursor:pointer;
  color:#fff;
}

#btnPizza {
  background:#ffc107;
  color:black;
}

#btnHamburguesas {
  background:#28a745;
}

#btnBebidas {
  background:#007bff;
}

#btnCarrito {
  background:#ff5722;
}

/* carrito */
#pedido-flotante{
 position:fixed;
 bottom:120px;
 left:50%;
 transform:translateX(-50%) translateY(120px);
 background:#fff;
 padding:18px;
 border-radius:15px;
 box-shadow:0 12px 35px rgba(0,0,0,0.25);
 opacity:0;
 transition:all 0.35s ease;
 z-index:9999;
 width:90%;
 max-width:320px;
 text-align:center;
 pointer-events:none;
}

#pedido-flotante.activo{
 transform:translateX(-50%) translateY(0);
 opacity:1;
 pointer-events:auto;
}

#pedido-flotante ul{
 list-style:none;
 padding:0;
 margin:0;
}

#pedido-flotante li{
 margin-bottom:10px;
 border-bottom:1px solid #ddd;
 padding-bottom:5px;
}

.acciones-pedido{
 display:flex;
 gap:10px;
 margin-top:10px;
}

.acciones-pedido button{
 flex:1;
 padding:10px;
 border:none;
 border-radius:8px;
 font-weight:bold;
}

#btn-borrar{
 background:#e53935;
 color:white;
}

#btn-enviar{
 background:#2e7d32;
 color:white;
}

/* popup */
#popup-cantidad {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  justify-content:center;
  align-items:center;
  z-index:99999;
}

.popup-content {
  background:white;
  padding:20px;
  border-radius:10px;
  width:300px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}
</style>
</head>

<body>

<header>
<img src="logo.png" class="logo">
<h1>Menú de Lomitos</h1>
<img src="Repartidor.png" class="icono">
</header>

<div id="menu" class="menu-container"></div>

<div id="pedido-flotante">
<h3>Mi Pedido</h3>

<ul id="lista-pedido"></ul>

<p id="total-pedido"></p>

<div class="acciones-pedido">
<button id="btn-borrar">Borrar</button>
<button id="btn-enviar">Enviar pedido</button>
</div>
</div>

<div id="popup-cantidad">
<div class="popup-content">
<h3 id="popup-nombre"></h3>

<input id="cantidad" type="number" value="1">

<br><br>

<button onclick="confirmar()">OK</button>
<button onclick="cerrar()">Cancelar</button>
</div>
</div>

<div class="btn-grid">
<button id="btnPizza" class="btn-flotante">PIZZAS</button>
<button id="btnHamburguesas" class="btn-flotante">HAMBURGUESAS</button>
<button id="btnBebidas" class="btn-flotante">BEBIDAS</button>
<button id="btnCarrito" class="btn-flotante">MI PEDIDO</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";

import {
 getDatabase,
 ref,
 push,
 onValue,
 remove
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyADGYsqhbCFuKj2fXpontLpND_rtT7Nlno",
  authDomain: "alorico-59754.firebaseapp.com",
  databaseURL: "https://alorico-59754-default-rtdb.firebaseio.com",
  projectId: "alorico-59754"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let clienteId = localStorage.getItem("clienteId");

if (!clienteId) {
 clienteId = "cliente_" + Date.now();
 localStorage.setItem("clienteId", clienteId);
}

const pedidoRef = ref(db, "pedidos/" + clienteId);

/* BOTONES */

document.getElementById("btnPizza").onclick = () =>
 location.href="https://alo-rico.github.io/pizza/";

document.getElementById("btnHamburguesas").onclick = () =>
 location.href="https://alo-rico.github.io/hamburguesa/";

document.getElementById("btnBebidas").onclick = () =>
 location.href="https://alo-rico.github.io/bebidas/";

document.getElementById("btnCarrito").onclick = () => {

 const p = document.getElementById("pedido-flotante");

 p.classList.toggle("activo");

 if(p.classList.contains("activo")){
  setTimeout(()=>{
   p.classList.remove("activo");
  },7000);
 }
};

/* LISTEN PEDIDO */

onValue(pedidoRef, snap=>{

 const data = snap.val();

 const lista = document.getElementById("lista-pedido");

 const totalTxt = document.getElementById("total-pedido");

 lista.innerHTML="";

 let total=0;

 if(data){

  Object.entries(data).forEach(([key,p])=>{

   const li=document.createElement("li");

   li.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;width:100%;">
      <span>${p.cantidad} x ${p.nombre}</span>

      <span
       onclick="eliminarItem('${key}')"
       style="
        background:#f44336;
        color:white;
        width:22px;
        height:22px;
        border-radius:50%;
        display:flex;
        align-items:center;
        justify-content:center;
        cursor:pointer;
        font-size:12px;
        font-weight:bold;
       "
      >
      🗑
      </span>
    </div>
   `;

   lista.appendChild(li);

   total += p.precio * p.cantidad;
  });
 }

 totalTxt.innerText = "Total: Gs. " + total.toLocaleString();
});

/* MENU */

const res = await fetch("./precios.json");

const data = await res.json();

Object.entries(data).forEach(([n,i])=>{

 const card=document.createElement("div");

 card.className="product";

 card.innerHTML = `
  <img src="imagen/${i.imagen}" class="img-click">
  <h3>${n}</h3>
  <p>Gs. ${i.precio}</p>
 `;

 card.addEventListener("click", (e) => {

  e.stopPropagation();

  window.abrir(n, i.precio);

 });

 document.getElementById("menu").appendChild(card);
});

/* POPUP */

let seleccionado={};

window.abrir = function(n,p){

 seleccionado={
  nombre:n,
  precio:p
 };

 document.getElementById("popup-nombre").innerText=n;

 document.getElementById("popup-cantidad").style.display="flex";
}

window.cerrar = function(){

 document.getElementById("popup-cantidad").style.display="none";
}

window.confirmar = function(){

 const cant =
 parseInt(document.getElementById("cantidad").value) || 1;

 push(pedidoRef,{
  ...seleccionado,
  cantidad:cant
 });

 window.cerrar();
}

/* ELIMINAR ITEM */

window.eliminarItem = function(key){

 remove(ref(db, "pedidos/" + clienteId + "/" + key));

}

/* BORRAR TODO */

document.getElementById("btn-borrar").onclick = () =>
 remove(pedidoRef);

/* WHATSAPP */

document.getElementById("btn-enviar").onclick = () => {

 onValue(pedidoRef,(snap)=>{

  const data=snap.val();

  if(!data) return alert("Sin pedido");

  let txt="";
  let total=0;

  Object.values(data).forEach(p=>{

   txt += `- ${p.nombre} x${p.cantidad}\n`;

   total += p.precio * p.cantidad;
  });

  const msg =
   `Hola envio mi pedido:%0A${txt}%0ATotal: Gs. ${total}`;

  window.open(
   `https://wa.me/+595971891251?text=${msg}`
  );

 },{onlyOnce:true});
};

</script>

</body>
</html>
