<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Menú Alo Rico - Lomitos</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

*{
 margin:0;
 padding:0;
 box-sizing:border-box;
}

body{
 font-family:'Poppins',sans-serif;
 background:#111827;
 color:white;
 text-align:center;
 min-height:100vh;
 overflow-x:hidden;
}

/* FONDO */

body::before{
 content:"";
 position:fixed;
 inset:0;
 background:
 linear-gradient(rgba(0,0,0,.82),rgba(0,0,0,.90)),
 url('https://images.unsplash.com/photo-1550547660-d9450f859349?q=80&w=1600&auto=format&fit=crop');
 background-size:cover;
 background-position:center;
 z-index:-2;
}

body::after{
 content:"";
 position:fixed;
 inset:0;
 backdrop-filter:blur(6px);
 z-index:-1;
}

/* HEADER */

header{
 padding:30px 20px 10px;
}

header img.logo{
 width:120px;
 border-radius:50%;
 border:4px solid #facc15;
 background:white;
 box-shadow:0 0 35px rgba(250,204,21,.35);
}

header h1{
 font-size:38px;
 margin-top:18px;
 color:#facc15;
 font-weight:700;
}

header img.icono{
 width:65px;
 margin-top:10px;
}

/* MENU */

.menu-container{
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
 gap:22px;
 padding:25px;
 padding-bottom:320px;
 max-width:1400px;
 margin:auto;
}

/* PRODUCTOS */

.product{
 background:rgba(255,255,255,.08);
 border:1px solid rgba(255,255,255,.08);
 border-radius:28px;
 overflow:hidden;
 cursor:pointer;
 transition:.25s;
 backdrop-filter:blur(10px);
 box-shadow:0 10px 30px rgba(0,0,0,.30);
}

.product:hover{
 transform:translateY(-6px) scale(1.02);
 box-shadow:0 20px 45px rgba(0,0,0,.45);
}

.product img{
 width:100%;
 height:260px;

 object-fit:contain;

 background:
 linear-gradient(
   145deg,
   rgba(255,255,255,.08),
   rgba(255,255,255,.02)
 );

 padding:12px;

 border-radius:28px 28px 0 0;
}

.product h3{
 font-size:20px;
 margin-top:16px;
 padding:0 12px;
 color:white;
}

.product p{
 margin:14px 0 18px;
 font-size:22px;
 font-weight:700;
 color:#22c55e;
}

/* BOTONES */

.btn-grid{
 position:fixed;
 right:15px;
 bottom:15px;
 display:grid;
 grid-template-columns:1fr 1fr;
 gap:12px;
 z-index:10000;
}

.btn-flotante{
 width:165px;
 height:58px;
 border:none;
 border-radius:18px;
 font-weight:700;
 cursor:pointer;
 font-size:15px;
 color:white;
 box-shadow:0 10px 25px rgba(0,0,0,.35);
}

#btnPizza{
 background:#f59e0b;
}

#btnHamburguesas{
 background:#22c55e;
}

#btnBebidas{
 background:#3b82f6;
}

#btnCarrito{
 background:#ef4444;
}

/* TOTAL */

#mensaje-total{
 display:none;
 background:#22c55e;
 color:#fff;
 padding:14px 18px;
 border-radius:16px;
 font-weight:700;
 box-shadow:0 10px 30px rgba(0,0,0,.35);
 position:fixed;
 bottom:145px;
 left:50%;
 transform:translateX(-50%);
 z-index:9999;
 min-width:260px;
}

/* PEDIDO */

#pedido-flotante{
 position:fixed;
 bottom:210px;
 left:50%;
 transform:translateX(-50%) translateY(120px);
 background:#111827;
 border:1px solid rgba(255,255,255,.08);
 padding:22px;
 border-radius:24px;
 box-shadow:0 20px 45px rgba(0,0,0,.45);
 opacity:0;
 transition:all .35s ease;
 z-index:9999;
 width:92%;
 max-width:390px;
 text-align:center;
 pointer-events:none;
}

#pedido-flotante.activo{
 transform:translateX(-50%) translateY(0);
 opacity:1;
 pointer-events:auto;
}

#pedido-flotante ul{
 list-style:none;
 padding:0;
}

.item-pedido{
 display:flex;
 justify-content:space-between;
 align-items:center;
 margin:10px 0;
 background:rgba(255,255,255,.05);
 padding:10px;
 border-radius:12px;
}

.btn-eliminar{
 background:#ef4444;
 color:white;
 border:none;
 border-radius:50%;
 width:28px;
 height:28px;
 cursor:pointer;
}

/* ACCIONES */

.acciones-pedido{
 display:flex;
 gap:10px;
 margin-top:16px;
}

.acciones-pedido button{
 flex:1;
 padding:13px;
 border:none;
 border-radius:14px;
 font-weight:700;
 cursor:pointer;
}

#btn-borrar{
 background:#dc2626;
 color:white;
}

#btn-enviar{
 background:#16a34a;
 color:white;
}

/* POPUP */

#popup-cantidad{
 display:none;
 position:fixed;
 top:0;
 left:0;
 width:100%;
 height:100%;
 background:rgba(0,0,0,.75);
 justify-content:center;
 align-items:center;
 z-index:99999;
}

.popup-content{
 background:#111827;
 padding:28px;
 border-radius:24px;
 width:320px;
 color:white;
}

.popup-content input{
 width:90px;
 font-size:22px;
 text-align:center;
 padding:10px;
 border:none;
 border-radius:12px;
 background:#1f2937;
 color:white;
}

/* RESPONSIVE */

@media(max-width:700px){

 .menu-container{
  grid-template-columns:repeat(2,1fr);
  gap:16px;

  padding-top:16px;
  padding-left:16px;
  padding-right:16px;

  padding-bottom:320px;
 }

}
 .product img{
  height:150px;
 }

 .btn-flotante{
  width:145px;
  height:54px;
  font-size:13px;
 }

 header h1{
  font-size:30px;
 }
}

</style>

</head>

<body>

<header>

<img src="logo.png" class="logo">

<h1>Menú de Lomitos</h1>

<img src="Repartidor.png" class="icono">

</header>

<div id="menu" class="menu-container"></div>

<!-- PEDIDO -->

<div id="pedido-flotante">

<h3 id="titulo-pedido">
Mi Pedido
</h3>

<ul id="lista-pedido"></ul>

<p id="total-pedido"></p>

<div class="acciones-pedido">

<button id="btn-borrar">
Borrar
</button>

<button id="btn-enviar">
Enviar pedido
</button>

</div>

</div>

<!-- POPUP -->

<div id="popup-cantidad">

<div class="popup-content">

<h3 id="popup-nombre"></h3>

<input id="cantidad" type="number" value="1" min="1">

<br><br>

<button
 onclick="confirmar()"
 style="background:#22c55e;color:white;padding:12px 18px;border:none;border-radius:12px;font-weight:bold;"
>
Agregar
</button>

<button
 onclick="cerrar()"
 style="background:#ef4444;color:white;padding:12px 18px;border:none;border-radius:12px;font-weight:bold;"
>
Cancelar
</button>

</div>

</div>

<!-- TOTAL -->

<div id="mensaje-total">
💰 Total: Gs. 0
</div>

<!-- BOTONES -->

<div class="btn-grid">

<button id="btnPizza" class="btn-flotante">
PIZZAS
</button>

<button id="btnHamburguesas" class="btn-flotante">
HAMBURGUESAS
</button>

<button id="btnBebidas" class="btn-flotante">
BEBIDAS
</button>

<button id="btnCarrito" class="btn-flotante">
MI PEDIDO
</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";

import {
 getDatabase,
 ref,
 push,
 onValue,
 remove
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

/* MESA */

const params =
new URLSearchParams(window.location.search);

const mesa =
params.get("mesa") || "general";

/* FIREBASE */

const firebaseConfig = {

 apiKey: "AIzaSyADGYsqhbCFuKj2fXpontLpND_rtT7Nlno",

 authDomain: "alorico-59754.firebaseapp.com",

 databaseURL: "https://alorico-59754-default-rtdb.firebaseio.com",

 projectId: "alorico-59754"
};

const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

/* CLIENTE */

const clienteId =
"mesa_" + mesa;

const pedidoRef =
ref(db,"pedidos/" + clienteId);

/* TITULO */

document.getElementById("titulo-pedido")
.innerText =
`Mi Pedido - Mesa ${mesa}`;

/* BOTONES */

document.getElementById("btnPizza").onclick = ()=>{

 location.href =
 `https://alo-rico.github.io/pizza/?mesa=${mesa}`;
};

document.getElementById("btnHamburguesas").onclick = ()=>{

 location.href =
 `https://alo-rico.github.io/hamburguesa/?mesa=${mesa}`;
};

document.getElementById("btnBebidas").onclick = ()=>{

 location.href =
 `https://alo-rico.github.io/bebidas/?mesa=${mesa}`;
};

document.getElementById("btnCarrito").onclick = ()=>{

 const p =
 document.getElementById("pedido-flotante");

 p.classList.toggle("activo");

 if(p.classList.contains("activo")){

  setTimeout(()=>{

   p.classList.remove("activo");

  },7000);
 }
};

/* TOTAL */

function actualizarMensajeTotal(total){

 const mensajeTotal =
 document.getElementById("mensaje-total");

 if(total > 0){

  mensajeTotal.innerHTML =
  `💰 Mesa ${mesa} - Total: Gs. ${total.toLocaleString()}`;

  mensajeTotal.style.display = "block";

 }else{

  mensajeTotal.style.display = "none";
 }
}

/* LISTEN PEDIDO */

onValue(pedidoRef, snap=>{

 const data = snap.val();

 const lista =
 document.getElementById("lista-pedido");

 const totalTxt =
 document.getElementById("total-pedido");

 lista.innerHTML="";

 let total=0;

 if(data){

  Object.entries(data).forEach(([key,p])=>{

   const li=document.createElement("li");

   li.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;width:100%;">

 <span>
  ${p.cantidad} x ${p.nombre}
  <br>
  <strong>
    Gs. ${(p.precio * p.cantidad).toLocaleString()}
  </strong>
</span>

      <span
       onclick="eliminarItem('${key}')"
       style="
        background:#ef4444;
        color:white;
        width:22px;
        height:22px;
        border-radius:50%;
        display:flex;
        align-items:center;
        justify-content:center;
        cursor:pointer;
        font-size:12px;
        font-weight:bold;
       "
      >
      🗑
      </span>

    </div>
   `;

   lista.appendChild(li);

   total += p.precio * p.cantidad;
  });
 }

 totalTxt.innerText =
 "Total: Gs. " + total.toLocaleString();

 actualizarMensajeTotal(total);
});

/* MENU FIREBASE */

const menuRef =
ref(db,"productos");

onValue(menuRef,(snap)=>{

 const data = snap.val();

 const menu =
 document.getElementById("menu");

 menu.innerHTML = "";

 if(data){

  Object.values(data).forEach((i)=>{

   if(i.categoria !== "lomitos") return;

   const card =
   document.createElement("div");

   card.className = "product";

   card.innerHTML = `
    <img src="${i.imagen}">
    <h3>${i.nombre}</h3>
    <p>Gs. ${Number(i.precio).toLocaleString()}</p>
   `;

   card.addEventListener("click",(e)=>{

    e.stopPropagation();

    abrir(
      i.nombre,
      Number(i.precio)
    );
   });

   menu.appendChild(card);

  });
 }
});

/* POPUP */

let seleccionado={};

window.abrir = function(n,p){

 seleccionado={
  nombre:n,
  precio:p
 };

 document.getElementById("popup-nombre")
 .innerText=n;

 document.getElementById("cantidad")
 .value = 1;

 document.getElementById("popup-cantidad")
 .style.display="flex";
}

window.cerrar = function(){

 document.getElementById("popup-cantidad")
 .style.display="none";
}

window.confirmar = function(){

 const cant =
 parseInt(
  document.getElementById("cantidad").value
 ) || 1;

 push(pedidoRef,{
  ...seleccionado,
  cantidad:cant
 });

 cerrar();
}

/* ELIMINAR */

window.eliminarItem = function(key){

 remove(
  ref(db,
   "pedidos/" + clienteId + "/" + key
  )
 );
}

/* BORRAR */

document.getElementById("btn-borrar")
.onclick = ()=>{

 remove(pedidoRef);
};

/* WHATSAPP */

document.getElementById("enviar-whatsapp").onclick = ()=>{

 onValue(pedidoRef,(snap)=>{

  const d = snap.val();

  if(!d){

   alert("Sin pedido");

   return;
  }

  let txt = "";

  let total = 0;

  Object.values(d).forEach(p=>{

   txt += `- ${p.nombre} x${p.cantidad} - Gs. ${(p.precio * p.cantidad).toLocaleString()}%0A`;

   total += p.precio * p.cantidad;
  });

  const mensaje =
  `Hola envio mi pedido - Mesa ${mesa}:%0A%0A${txt}%0ATOTAL: Gs. ${total.toLocaleString()}`;

  window.open(
   `https://wa.me/+595971891251?text=${mensaje}`
  );

  remove(pedidoRef);

  document.getElementById("pedido-flotante")
  .classList.remove("activo");

 },{onlyOnce:true});
};

</script>

</body>
</html>
