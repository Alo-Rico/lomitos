<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Menú Alo Rico - Lomitos</title>

<style>
body { font-family: Arial, sans-serif; background:#fefaf0; margin:0; text-align:center; }

header img.logo { width:120px; margin-top:20px; }
header h1 { color:#c24a00; }
header img.icono { width:60px; }

.menu-container {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  padding:20px;
  padding-bottom:120px;
}

.product {
  width:180px;
  background:white;
  margin:15px;
  border-radius:10px;
  box-shadow:0 4px 8px rgba(0,0,0,0.1);
  cursor:pointer;
}
.product img {
  width:100%;
  height:140px;
  object-fit:cover;
}

/* 🔥 SOLO ESTO SE AGREGA (EFECTO PIZZA) */
button{
 transition: all 0.15s ease;
 box-shadow: 0 4px 0 rgba(0,0,0,0.2);
}
button:active{
 transform: translateY(3px);
 box-shadow: 0 1px 0 rgba(0,0,0,0.2);
}

.btn-grid {
  position:fixed;
  right:15px;
  bottom:15px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  z-index:9998;
}

.btn-flotante {
  padding:12px;
  border:none;
  border-radius:50px;
  font-weight:bold;
  color:white;
  cursor:pointer;
}

/* 🎨 COLORES IGUAL QUE PIZZA */
#btnPizza { background:#ffc107; color:black; }
#btnHamburguesas { background:#28a745; }
#btnBebidas { background:#007bff; }
#btnCarrito { background:#ff5722; }

#pedido-flotante {
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0);
  width:380px;
  background:white;
  padding:15px;
  border-radius:10px;
  text-align:left;
}
#pedido-flotante.activo { transform:translate(-50%,-50%) scale(1); }

#popup-cantidad {
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  justify-content:center;
  align-items:center;
}
.popup-content { background:white; padding:20px; border-radius:10px; }
</style>
</head>

<body>

<header>
<img src="logo.png" class="logo">
<h1>Menú de Lomitos</h1>
<img src="Repartidor.png" class="icono">
</header>

<div id="menu" class="menu-container"></div>

<div id="pedido-flotante">
<h3>Mi Pedido</h3>
<ul id="lista-pedido"></ul>
<p id="total-pedido"></p>
<button id="btn-borrar">Borrar</button>
<button id="btn-enviar">Enviar</button>
</div>

<div id="popup-cantidad">
<div class="popup-content">
<h3 id="popup-nombre"></h3>
<input id="cantidad" type="number" value="1">
<br><br>
<button onclick="confirmar()">OK</button>
<button onclick="cerrar()">Cancelar</button>
</div>
</div>

<div class="btn-grid">
<button id="btnPizza" class="btn-flotante">PIZZAS</button>
<button id="btnHamburguesas" class="btn-flotante">HAMBURGUESAS</button>
<button id="btnBebidas" class="btn-flotante">BEBIDAS</button>
<button id="btnCarrito" class="btn-flotante">MI PEDIDO</button>
</div>

<script type="module">
/* 🔒 TODO TU JS ORIGINAL SIN TOCAR */
</script>

</body>
</html>
