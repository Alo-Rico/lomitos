<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Menú Alo Rico - Lomitos</title>

<style>
body { font-family: Arial; background:#fefaf0; margin:0; text-align:center; }

header img.logo { width:120px; margin-top:20px; }
header h1 { color:#c24a00; }
header img.icono { width:60px; }

.menu-container {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  padding:20px;
  padding-bottom:120px;
}

.product {
  width:180px;
  background:white;
  margin:15px;
  border-radius:10px;
  box-shadow:0 4px 8px rgba(0,0,0,0.1);
  cursor:pointer;
}

.product img {
  width:100%;
  height:140px;
  object-fit:cover;
  border-radius:10px 10px 0 0;
}

.btn-grid {
  position:fixed;
  right:15px;
  bottom:15px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.btn-flotante {
  padding:12px;
  border:none;
  border-radius:50px;
  font-weight:bold;
  color:white;
  cursor:pointer;
}

#btnPizza { background:#ffc107; color:black; }
#btnHamburguesas { background:#28a745; }
#btnLomitos { background:#ff5722; }
#btnCarrito { background:#007bff; }

#pedido-flotante {
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0);
  width:350px;
  background:white;
  padding:15px;
  border-radius:10px;
  box-shadow:0 0 15px rgba(0,0,0,0.3);
}

#pedido-flotante.activo {
  transform:translate(-50%,-50%) scale(1);
}

#popup-cantidad {
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  justify-content:center;
  align-items:center;
}

.popup-content {
  background:white;
  padding:20px;
  border-radius:10px;
}
</style>
</head>

<body>

<header>
<img src="logo.png" class="logo">
<h1>Menú de Lomitos</h1>
<img src="Repartidor.png" class="icono">
</header>

<div class="menu-container" id="menu"></div>

<!-- PEDIDO -->
<div id="pedido-flotante">
<h3>Mi Pedido</h3>
<ul id="lista-pedido"></ul>
<p id="total-pedido"></p>
<button onclick="borrarPedido()">Borrar</button>
<button onclick="enviarPedido()">Enviar</button>
</div>

<!-- POPUP -->
<div id="popup-cantidad">
  <div class="popup-content">
    <h3 id="popup-nombre"></h3>
    <input id="cantidad" type="number" value="1">
    <br><br>
    <button onclick="confirmar()">OK</button>
    <button onclick="cerrar()">Cancelar</button>
  </div>
</div>

<!-- BOTONES -->
<div class="btn-grid">
<button id="btnPizza">PIZZAS</button>
<button id="btnHamburguesas">HAMB</button>
<button id="btnLomitos">LOMITOS</button>
<button id="btnCarrito">PEDIDO</button>
</div>

<script>
const pedidoKey = "carritoPedido";
let seleccionado = {};

// 🔗 BOTONES
btnPizza.onclick = () => location.href="https://alo-rico.github.io/precios-alorico/";
btnHamburguesas.onclick = () => location.href="https://alo-rico.github.io/hamburguesas/";
btnLomitos.onclick = () => location.href="https://alo-rico.github.io/lomitos/";
btnCarrito.onclick = () => {
  document.getElementById("pedido-flotante").classList.toggle("activo");
};

// 🔥 CARGAR MENU LOMITOS
async function cargarMenu() {
  try {
    const res = await fetch("./precios.json");
    const data = await res.json();

    const menu = document.getElementById("menu");
    menu.innerHTML = "";

    Object.entries(data).forEach(([nombre, info]) => {

      const card = document.createElement("div");
      card.className = "product";

      card.innerHTML = `
        <img src="imagen/${info.imagen}" 
             onerror="this.src='https://via.placeholder.com/200x140?text=Sin+imagen'">
        <h3>${nombre}</h3>
        <p>Gs. ${info.precio.toLocaleString()}</p>
      `;

      card.onclick = () => abrir(nombre, info.precio);

      menu.appendChild(card);
    });

  } catch (e) {
    document.getElementById("menu").innerHTML =
      "<p style='color:red'>No se pudo cargar el menú</p>";
  }
}

// POPUP
function abrir(nombre, precio){
  seleccionado = {nombre, precio};
  document.getElementById("popup-nombre").innerText = nombre;
  document.getElementById("popup-cantidad").style.display = "flex";
}

function cerrar(){
  document.getElementById("popup-cantidad").style.display = "none";
}

function confirmar(){
  const cant = parseInt(document.getElementById("cantidad").value) || 1;
  const pedido = JSON.parse(localStorage.getItem(pedidoKey)) || [];
  pedido.push({nombre: seleccionado.nombre, precio: seleccionado.precio * cant});
  localStorage.setItem(pedidoKey, JSON.stringify(pedido));
  cerrar();
  render();
}

// PEDIDO
function render(){
  const lista = document.getElementById("lista-pedido");
  const pedido = JSON.parse(localStorage.getItem(pedidoKey)) || [];
  lista.innerHTML = "";
  let total = 0;

  pedido.forEach(p=>{
    const li = document.createElement("li");
    li.textContent = p.nombre + " - Gs. " + p.precio.toLocaleString();
    lista.appendChild(li);
    total += p.precio;
  });

  document.getElementById("total-pedido").innerText =
    "Total: Gs. " + total.toLocaleString();
}

function borrarPedido(){
  localStorage.removeItem(pedidoKey);
  render();
}

function enviarPedido(){
  const pedido = JSON.parse(localStorage.getItem(pedidoKey)) || [];
  if(pedido.length===0) return alert("Vacío");

  let msg = pedido.map(p=>p.nombre).join("%0A");
  window.open("https://wa.me/?text="+msg);
}

// INIT
cargarMenu();
render();

</script>

</body>
</html>
